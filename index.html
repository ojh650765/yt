<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Premium 결제 확인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square.css" rel="stylesheet">
<style>
:root {
  --bg: hsl(0,0%,7%);
  --bg-card: hsl(240,2%,13%);
  --bg-card2: hsl(240,1%,17%);
  --border: hsl(0,0%,22%);
  --ink: hsl(0,0%,100%);
  --ink2: hsl(0,0%,98%);
  --muted: hsl(0,0%,62%);
  --accent: hsl(45,100%,72%);
  --safe: #45d175;
  --warn: #f0b429;
  --danger: #ef4444;
  --safe-bg: rgba(69,209,117,.12);
  --warn-bg: rgba(240,180,41,.12);
  --danger-bg: rgba(239,68,68,.12);
  --shadow: -4px 8px 24px hsla(0,0%,0%,.25);
  --shadow2: 0 16px 30px hsla(0,0%,0%,.25);
  --radius: 20px;
  --ff: 'NanumSquare','Poppins',sans-serif;
  --ff-en: 'Poppins',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--ff);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ===== LAYOUT ===== */
.page-wrap{
  max-width:1200px;margin:0 auto;padding:60px 20px;
  display:grid;grid-template-columns:280px 1fr;gap:24px;
  align-items:start;
}
.page-wrap.three-col{
  max-width:1440px;
  grid-template-columns:260px 1fr 280px;
}
@media(max-width:1100px){
  .page-wrap.three-col{grid-template-columns:260px 1fr}
  .page-wrap.three-col .right-panel{display:none}
}
@media(max-width:900px){
  .page-wrap{grid-template-columns:1fr;padding:24px 16px}
  .page-wrap.three-col{grid-template-columns:1fr}
  .page-wrap.three-col .right-panel{display:block}
}

/* right panel */
.right-panel{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;
  position:sticky;top:40px;
  box-shadow:var(--shadow);
}
@media(max-width:900px){
  .right-panel{position:static}
}

/* ===== SIDEBAR ===== */
.sidebar{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:28px 24px;
  position:sticky;top:40px;
  box-shadow:var(--shadow);
}
@media(max-width:900px){
  .sidebar{position:static}
}
.sidebar .logo{
  text-align:center;margin-bottom:20px;
}
.sidebar .logo-icon{
  width:64px;height:64px;border-radius:16px;
  background:linear-gradient(135deg,#ff0033,#ff4466);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;font-size:28px;color:#fff;
}
.sidebar .logo h2{
  font-family:var(--ff-en);font-size:20px;font-weight:600;
}
.sidebar .logo h2 .accent{color:var(--accent)}
.sidebar .logo p{font-size:14px;color:var(--muted);margin-top:4px}

.sidebar .sep{height:1px;background:var(--border);margin:20px 0}

.sidebar .price-section h3{
  font-size:14px;color:var(--muted);letter-spacing:.1em;margin-bottom:12px;
}
.sidebar .price-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;font-size:16px;
}
.sidebar .price-row .pk{color:var(--muted)}
.sidebar .price-row .pv{font-family:var(--ff-en);font-weight:600}
.sidebar .price-highlight{
  background:linear-gradient(135deg,hsla(45,100%,72%,.15),hsla(35,100%,68%,0));
  border:1px solid hsla(45,100%,72%,.3);
  border-radius:12px;padding:16px;text-align:center;margin-top:12px;
}
.sidebar .price-highlight .big{
  font-family:var(--ff-en);font-size:38px;font-weight:700;color:var(--accent);
}
.sidebar .price-highlight .big small{font-size:15px;color:var(--muted);font-weight:400;margin-left:2px}
.sidebar .price-highlight .sub{font-size:14px;color:var(--muted);margin-top:6px}

.sidebar .date-info{
  font-size:16px;color:var(--muted);text-align:center;margin-top:16px;
}

.sidebar .admin-link{
  display:block;width:100%;margin-top:16px;padding:10px;
  background:transparent;border:1px solid var(--border);border-radius:10px;
  color:var(--muted);font-family:var(--ff);font-size:15px;
  cursor:pointer;text-align:center;transition:all .2s;
}
.sidebar .admin-link:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.sidebar .logout-btn{
  display:block;width:100%;margin-top:8px;padding:10px;
  background:transparent;border:1px solid var(--border);border-radius:10px;
  color:var(--danger);font-family:var(--ff);font-size:15px;
  cursor:pointer;text-align:center;transition:all .2s;
}
.sidebar .logout-btn:hover{background:var(--danger);color:#fff;border-color:var(--danger)}

/* balance section */
.balance-section{margin-top:4px}
.balance-section h3{font-size:14px;color:var(--muted);letter-spacing:.1em;margin-bottom:12px}
.balance-amount{font-family:var(--ff-en);font-size:32px;font-weight:700;text-align:center;margin-bottom:8px}
.balance-amount.ok{color:var(--safe)}
.balance-amount.low{color:var(--warn)}
.balance-amount.critical{color:var(--danger)}
.balance-updated{font-size:13px;color:var(--muted);text-align:center;margin-bottom:12px}
.balance-charges{font-size:14px}
.balance-charge-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--border)}
.balance-charge-row:first-child{border-top:none}
.balance-charge-row .bc-name{color:var(--muted)}
.balance-charge-row .bc-val{font-family:var(--ff-en);font-weight:600;white-space:nowrap}
.balance-forecast{margin-top:12px;padding:12px;border-radius:10px;background:var(--bg-card2);font-size:13px;color:var(--muted)}
.balance-forecast .bf-row{display:flex;justify-content:space-between;padding:4px 0}
.balance-forecast .bf-date{color:var(--ink)}
.balance-forecast .bf-amt{font-family:var(--ff-en);font-weight:600}
.balance-forecast .bf-amt.negative{color:var(--danger)}
.balance-warning{margin-top:12px;padding:10px;border-radius:10px;font-size:14px;font-weight:600;text-align:center}
.balance-warning.warn{background:var(--warn-bg);color:var(--warn)}
.balance-warning.danger{background:var(--danger-bg);color:var(--danger)}
.bal-field{margin-top:10px}
.bal-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.bal-field .bal-row{display:flex;gap:6px}
.bal-field input{flex:1;min-width:0;padding:8px 10px;background:var(--bg-card2);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-family:var(--ff);font-size:14px}
.bal-field input:focus{outline:none;border-color:var(--accent)}
.bal-save{margin-top:10px;width:100%;padding:10px;background:var(--accent);color:var(--bg);border:none;border-radius:8px;font-family:var(--ff);font-size:14px;font-weight:600;cursor:pointer}
.bal-save:hover{opacity:.85}

/* ===== MAIN CONTENT ===== */
.main-content{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:32px;min-height:400px;
  box-shadow:var(--shadow);
}

.page-title{font-size:30px;font-weight:700;margin-bottom:8px}
.page-title .accent{color:var(--accent)}
.page-sub{font-size:16px;color:var(--muted);margin-bottom:28px}

/* search */
.search-wrap{position:relative;margin-bottom:28px}
.search-wrap input{
  width:100%;padding:14px 18px;border:1px solid var(--border);
  border-radius:12px;background:var(--bg-card2);color:var(--ink);
  font-family:var(--ff);font-size:16px;transition:border-color .2s;
}
.search-wrap input:focus{outline:none;border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.suggestions{position:absolute;top:100%;left:0;right:0;background:var(--bg-card2);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;z-index:10;display:none;overflow:hidden}
.suggestions.active{display:block}
.sug-item{padding:14px 18px;cursor:pointer;font-size:15px;border-bottom:1px solid var(--border);color:var(--ink2);transition:background .15s}
.sug-item:last-child{border-bottom:none}
.sug-item:hover,.sug-item.selected{background:var(--accent);color:var(--bg)}

/* result card */
.result-card{
  background:var(--bg-card2);border:2px solid var(--border);
  border-radius:16px;padding:40px 36px;text-align:center;
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.result-card.border-safe{border-color:var(--safe)}
.result-card.border-soon{border-color:var(--warn)}
.result-card.border-expired{border-color:var(--danger)}
.result-card .r-name{font-size:34px;font-weight:700;margin-bottom:8px}
.result-card .dday-big{font-family:var(--ff-en);font-size:clamp(56px,14vw,80px);font-weight:700;line-height:1;margin-bottom:6px}
.result-card .dday-big.safe{color:var(--safe)}
.result-card .dday-big.soon{color:var(--warn)}
.result-card .dday-big.expired{color:var(--danger)}
.result-card .dday-label{font-size:18px;color:var(--muted);margin-bottom:32px}
.result-card .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;text-align:left}
.result-card .info-item .ik{font-size:15px;color:var(--muted);margin-bottom:6px}
.result-card .info-item .iv{font-family:var(--ff-en);font-size:22px;font-weight:600}
.result-card .status-bar{margin-top:28px;padding:16px 20px;border-radius:10px;font-size:17px;font-weight:600}
.status-bar.safe{background:var(--safe-bg);color:var(--safe)}
.status-bar.soon{background:var(--warn-bg);color:var(--warn)}
.status-bar.expired{background:var(--danger-bg);color:var(--danger);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.no-result{text-align:center;padding:40px;color:var(--muted);font-size:14px}

/* admin sections */
.admin-bar{
  background:var(--bg-card2);border:1px solid var(--border);
  border-radius:12px;padding:12px 18px;margin-bottom:24px;
  font-size:15px;color:var(--muted);display:flex;
  justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;
}
.local-badge{background:var(--accent);color:var(--bg);padding:3px 10px;border-radius:6px;font-size:13px;font-weight:600;margin-left:8px}

.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--bg-card2);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.stat .label{font-size:14px;color:var(--muted);margin-bottom:6px}
.stat .value{font-family:var(--ff-en);font-size:30px;font-weight:600;color:var(--accent)}
.stat .value small{font-size:15px;color:var(--muted);font-weight:400;margin-left:4px}

.section-title{font-size:16px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:12px;font-weight:500}
.section-title::after{content:"";flex:1;height:1px;background:var(--border)}

.members{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:28px}
.card{background:var(--bg-card2);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow2)}
.card.card-expired{border-color:var(--danger)}
.card.card-soon{border-color:var(--warn)}
.status-dot{position:absolute;top:20px;right:20px;width:10px;height:10px;border-radius:50%}
.dot-safe{background:var(--safe)}
.dot-soon{background:var(--warn)}
.dot-expired{background:var(--danger);animation:pulse 1.5s infinite}
.card .c-name{font-size:24px;font-weight:700;margin-bottom:4px}
.card .c-sub{font-size:15px;color:var(--muted);margin-bottom:14px}
.card .c-row{display:flex;justify-content:space-between;padding:9px 0;border-top:1px solid var(--border);font-size:16px}
.card .c-row:first-of-type{border-top:none}
.card .c-row .ck{color:var(--muted)}
.card .c-row .cv{font-family:var(--ff-en);font-weight:600}
.c-dday{margin-top:12px;padding:12px;border-radius:10px;font-size:20px;font-weight:700;text-align:center}
.c-dday.safe{background:var(--safe-bg);color:var(--safe)}
.c-dday.soon{background:var(--warn-bg);color:var(--warn)}
.c-dday.expired{background:var(--danger-bg);color:var(--danger)}
.card .c-actions{margin-top:10px}
.card .c-actions button{width:100%;font-family:var(--ff);font-size:15px;padding:10px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--ink);cursor:pointer;transition:all .15s}
.card .c-actions button:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}

.form-wrap{background:var(--bg-card2);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:28px}
.form-wrap h2{font-size:22px;font-weight:600;margin-bottom:16px;color:var(--accent)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;align-items:end}
.field label{display:block;font-size:14px;color:var(--muted);margin-bottom:6px}
.field input{width:100%;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-family:var(--ff);font-size:16px}
.field input:focus{outline:none;border-color:var(--accent)}
.field input::-webkit-calendar-picker-indicator{filter:invert(1)}
.btn-add{padding:12px 20px;background:var(--accent);color:var(--bg);border:none;border-radius:10px;font-family:var(--ff);font-size:16px;font-weight:600;cursor:pointer}
.btn-add:hover{opacity:.85}

.history{background:var(--bg-card2);border:1px solid var(--border);border-radius:16px;margin-bottom:24px;overflow:hidden}
.history-row{display:grid;grid-template-columns:140px 1fr 90px 70px;padding:14px 20px;border-bottom:1px solid var(--border);font-size:16px;align-items:center;gap:10px}
.history-row:last-child{border-bottom:none}
.h-date{color:var(--muted)}
.h-name{font-weight:600}
.h-months{color:var(--muted);text-align:right}
.h-del{padding:6px 10px;font-family:var(--ff);font-size:14px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;justify-self:end}
.h-del:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
.empty-msg{padding:40px;text-align:center;color:var(--muted);font-size:16px}

.save-btn{
  display:block;width:100%;padding:16px;margin-bottom:20px;
  background:var(--accent);color:var(--bg);border:none;border-radius:12px;
  font-family:var(--ff);font-size:18px;font-weight:700;
  cursor:pointer;transition:opacity .2s;
}
.save-btn:hover{opacity:.85}
.save-btn.has-changes{animation:savePulse 2s infinite}
@keyframes savePulse{0%,100%{opacity:1}50%{opacity:.7}}

.admin-footer{padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:15px;color:var(--muted);flex-wrap:wrap;gap:10px}
.admin-footer button{background:none;border:none;color:var(--muted);font-family:var(--ff);font-size:15px;cursor:pointer;text-decoration:underline}
.admin-footer button:hover{color:var(--accent)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:14px 28px;border-radius:12px;font-family:var(--ff);font-size:14px;font-weight:500;z-index:2000;animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards;white-space:nowrap;box-shadow:var(--shadow)}
.toast.ok{background:var(--safe);color:#000}
.toast.err{background:var(--danger);color:#fff}
.toast.info{background:var(--bg-card);color:var(--ink);border:1px solid var(--border)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(20px)}}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:36px;width:90%;max-width:380px;text-align:center;box-shadow:var(--shadow2)}
.modal-box h2{font-size:20px;font-weight:600;margin-bottom:10px;color:var(--accent)}
.modal-box p{font-size:15px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.modal-box button{margin-top:12px;padding:12px 28px;background:var(--accent);color:var(--bg);border:none;border-radius:10px;font-family:var(--ff);font-size:14px;font-weight:600;cursor:pointer}

@media(max-width:600px){
  .result-card{padding:24px 20px}
  .result-card .info-grid{grid-template-columns:1fr;gap:12px}
  .history-row{grid-template-columns:1fr;gap:4px}
  .h-months,.h-del{text-align:left;justify-self:start}
  .summary-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- MODAL -->
<div class="modal-overlay" id="info-modal">
  <div class="modal-box">
    <h2>알림</h2>
    <p id="modal-msg"></p>
    <button onclick="closeModal()">닫기</button>
  </div>
</div>

<!-- ===== PUBLIC VIEW ===== -->
<div id="public-view" class="page-wrap">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">&#9654;</div>
      <h2>YouTube <span class="accent">Premium</span></h2>
      <p>Payment Tracker</p>
    </div>

    <div class="sep"></div>

    <div class="price-section" id="sidebar-price">
      <h3>MONTHLY COST</h3>
      <div style="text-align:center;color:var(--muted);font-size:15px;padding:12px 0">환율 불러오는 중...</div>
    </div>

    <div class="sep"></div>

    <div class="date-info" id="pub-date"></div>
    <button class="admin-link" id="admin-btn" onclick="tryEnterAdmin()" style="display:none">Admin</button>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <div class="page-title">결제 <span class="accent">확인</span></div>
    <div class="page-sub">이름을 검색하면 결제 상태를 확인할 수 있습니다</div>

    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="이름을 입력하세요" autocomplete="off">
      <div class="suggestions" id="suggestions"></div>
    </div>

    <div id="search-result"></div>
  </div>
</div>

<!-- ===== ADMIN VIEW ===== -->
<div id="admin-view" class="page-wrap three-col" style="display:none">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">&#9654;</div>
      <h2>YouTube <span class="accent">Premium</span></h2>
      <p>관리자 모드</p>
    </div>

    <div class="sep"></div>

    <div class="price-section" id="admin-sidebar-price">
      <h3>MONTHLY COST</h3>
      <div style="text-align:center;color:var(--muted);font-size:15px;padding:12px 0">환율 불러오는 중...</div>
    </div>

    <div class="sep"></div>

    <div class="date-info" id="admin-today"></div>
    <button class="logout-btn" onclick="exitAdmin()">Logout</button>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <div class="page-title">결제 <span class="accent">장부</span></div>
    <div class="page-sub">Shared Subscription · Payment Tracker</div>

    <div class="admin-bar">
      <span>ADMIN MODE</span>
      <span id="local-status"></span>
    </div>

    <div class="summary-grid" id="summary"></div>

    <div class="section-title">Members</div>
    <div class="members" id="members"></div>

    <div class="form-wrap">
      <h2>결제 기록 추가</h2>
      <div class="form-grid">
        <div class="field">
          <label>이름</label>
          <input type="text" id="f-name" placeholder="예: 구회원" list="name-list">
          <datalist id="name-list"></datalist>
        </div>
        <div class="field">
          <label>결제일</label>
          <input type="date" id="f-date">
        </div>
        <div class="field">
          <label>개월 수</label>
          <input type="number" id="f-months" min="1" value="1">
        </div>
        <div class="field">
          <button class="btn-add" onclick="addPayment()">+ 추가</button>
        </div>
      </div>
    </div>

    <div class="section-title">History</div>
    <div class="history" id="history"></div>

    <button class="save-btn" id="save-btn" onclick="saveToGitHub()" style="display:none">GitHub에 저장</button>

    <div class="admin-footer">
      <div id="footer-token-info"></div>
      <div>
        <button onclick="exportData()">Export</button> &middot;
        <button onclick="resetData()">Reset</button> &middot;
        <button onclick="clearToken()">토큰 제거</button>
      </div>
    </div>

<script>
const DATA_URL = './data.json';
const LS_KEY = 'yt_premium_admin_v2';
const TOKEN_KEY = 'yt_gh_token';
const INR_TOTAL = 389;
const MEMBER_COUNT = 6;

let payments = [], serverData = [], isAdmin = false, hasLocalChanges = false, cachedKrwPerPerson = null, ghToken = null;

function toast(msg, type='info') {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const el=document.createElement('div');el.className='toast '+type;el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),3200);
}


function getRepoInfo() {
  const h=location.hostname,p=location.pathname;
  if(h.endsWith('.github.io')){return{owner:h.replace('.github.io',''),repo:p.split('/').filter(Boolean)[0]||''};}
  return null;
}
async function ghCommitData(data) {
  if(!ghToken){toast('GitHub 토큰이 없습니다','err');return false;}
  const info=getRepoInfo();if(!info||!info.repo){toast('GitHub 레포 감지 실패','err');return false;}
  try{
    const g=await fetch(`https://api.github.com/repos/${info.owner}/${info.repo}/contents/data.json`,{headers:{'Authorization':'token '+ghToken}});
    if(!g.ok){toast('파일 정보 조회 실패','err');return false;}
    const f=await g.json();
    const c=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)+'\n')));
    const r=await fetch(`https://api.github.com/repos/${info.owner}/${info.repo}/contents/data.json`,{method:'PUT',headers:{'Authorization':'token '+ghToken,'Content-Type':'application/json'},body:JSON.stringify({message:'Update payment data',content:c,sha:f.sha})});
    if(r.ok){toast('GitHub에 저장 완료','ok');serverData=structuredClone(data);hasLocalChanges=false;return true;}
    else{toast('GitHub 저장 실패','err');return false;}
  }catch{toast('네트워크 오류','err');return false;}
}
function setupToken(){
  const h=location.hash;
  if(h.startsWith('#token=')){ghToken=h.replace('#token=','');localStorage.setItem(TOKEN_KEY,ghToken);history.replaceState(null,'',location.pathname+location.search);toast('토큰 저장 완료','ok');}
  else{ghToken=localStorage.getItem(TOKEN_KEY)||null;}
}
function clearToken(){ghToken=null;localStorage.removeItem(TOKEN_KEY);toast('토큰 제거됨','info');renderAdmin();}


async function fetchExchangeRate(){
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/INR');const d=await r.json();
    if(d.result==='success'&&d.rates&&d.rates.KRW)renderPrice(d.rates.KRW);else renderPriceError();
  }catch{renderPriceError();}
}
function renderPrice(rate){
  const ytAmt=(balanceData&&balanceData.charges)?((balanceData.charges.find(c=>c.name.includes('YouTube'))||{}).amount||INR_TOTAL):INR_TOTAL;
  const pp=ytAmt/MEMBER_COUNT, krwT=Math.round(ytAmt*rate), krwP=Math.round(pp*rate);
  cachedKrwPerPerson=krwP;
  const sidebarHtml=`
    <h3>MONTHLY COST</h3>
    <div class="price-row"><span class="pk">총액</span><span class="pv">₹${ytAmt}/월</span></div>
    <div class="price-row"><span class="pk">인원</span><span class="pv">${MEMBER_COUNT}명</span></div>
    <div class="price-row"><span class="pk">1인 (₹)</span><span class="pv">₹${pp.toFixed(1)}</span></div>
    <div class="price-row"><span class="pk">환율</span><span class="pv">1₹ = ${rate.toFixed(2)}₩</span></div>
    <div class="price-highlight">
      <div class="big">₩${(Math.floor(krwP/100)*100).toLocaleString()}<small>/월</small></div>
      <div class="sub">1인 월 납부금</div>
    </div>`;
  document.getElementById('sidebar-price').innerHTML=sidebarHtml;
  document.getElementById('admin-sidebar-price').innerHTML=sidebarHtml;
  const input=document.getElementById('search-input');
  if(input&&input.value.trim())doSearch(input.value.trim());
}
function renderPriceError(){
  const h='<h3>MONTHLY COST</h3><div style="text-align:center;color:var(--muted);font-size:15px;padding:12px 0">환율 정보를 불러올 수 없습니다</div>';
  document.getElementById('sidebar-price').innerHTML=h;
  document.getElementById('admin-sidebar-price').innerHTML=h;
}


let balanceData = null;
const BALANCE_URL = './balance.json';

async function fetchBalance(){
  try{balanceData=await fetchFile('balance.json');}catch{balanceData=null;}
}

function getNextChargeDate(day){
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  let next=new Date(y,m,day);
  if(d>=day)next=new Date(y,m+1,day);
  return next;
}

function calcBalanceForecast(){
  if(!balanceData)return null;
  const charges=balanceData.charges||[];
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  let bal=balanceData.amount;
  const events=[];
  for(let i=0;i<4;i++){
    charges.forEach(c=>{
      const m=now.getMonth()+i;
      const y=now.getFullYear()+Math.floor(m/12);
      const mo=m%12;
      const dt=new Date(y,mo,c.day);
      if(dt>now)events.push({date:dt,name:c.name,amount:c.amount});
    });
  }
  events.sort((a,b)=>a.date-b.date);
  const forecast=[];
  let insuffDate=null, insuffName=null;
  events.forEach(e=>{
    bal-=e.amount;
    forecast.push({date:e.date,name:e.name,amount:e.amount,remaining:bal});
    if(bal<0&&!insuffDate){insuffDate=e.date;insuffName=e.name;}
  });
  const nextCharge=events[0]||null;
  const nextInsuff=balanceData.amount<(nextCharge?nextCharge.amount:0);
  return{balance:balanceData.amount,updated:balanceData.updated,charges,forecast,insuffDate,insuffName,nextCharge,nextInsuff};
}

function renderBalance(){
  const el=document.getElementById('balance-section');
  if(!el||!balanceData)return;
  const fc=calcBalanceForecast();
  if(!fc){el.innerHTML='<h3>INR BALANCE</h3><div style="color:var(--muted);font-size:14px;text-align:center">데이터 없음</div>';return;}

  const statusClass=fc.nextInsuff?'critical':fc.insuffDate?'low':'ok';
  let warningHtml='';
  if(fc.nextInsuff){
    warningHtml=`<div class="balance-warning danger">${fc.nextCharge.name}<br>₹${fc.nextCharge.amount} 결제 불가</div>`;
  }else if(fc.insuffDate){
    const dd=fc.insuffDate;
    warningHtml=`<div class="balance-warning warn">${dd.getFullYear()}년 ${dd.getMonth()+1}월 ${dd.getDate()}일<br>${fc.insuffName} 잔액 부족</div>`;
  }

  const chargesHtml=fc.charges.map(c=>{
    const nd=getNextChargeDate(c.day);
    return`<div class="balance-charge-row"><span class="bc-name">${c.name} (${nd.getMonth()+1}/${nd.getDate()})</span><span class="bc-val">₹${c.amount}</span></div>`;
  }).join('');


  const forecastHtml=fc.forecast.slice(0,4).map(f=>{
    const ds=(f.date.getMonth()+1)+'/'+f.date.getDate();
    const amtClass=f.remaining<0?'negative':'';
    return`<div class="bf-row"><span>${ds} ${f.name}</span><span class="bf-amt ${amtClass}">₹${f.remaining.toLocaleString()}</span></div>`;
  }).join('');

  let editHtml='';
  if(isAdmin){
    const chargeEdits=fc.charges.map((c,i)=>`
      <div class="bal-field">
        <label>${c.name} (매월 ${c.day}일)</label>
        <div class="bal-row">
          <input type="number" id="charge-amt-${i}" value="${c.amount}" placeholder="₹">
          <input type="number" id="charge-day-${i}" value="${c.day}" placeholder="일" style="max-width:60px">
        </div>
      </div>`).join('');
    editHtml=`
      <div class="bal-field"><label>잔액 (₹)</label><div class="bal-row"><input type="number" id="bal-input" value="${fc.balance}"></div></div>
      ${chargeEdits}
      <button class="bal-save" onclick="updateBalance()">저장</button>`;
  }

  el.innerHTML=`
    <h3>INR BALANCE</h3>
    <div class="balance-amount ${statusClass}">₹${fc.balance.toLocaleString()}</div>
    <div class="balance-updated">${fc.updated} 기준</div>
    <div class="balance-charges">${chargesHtml}</div>
    <div class="balance-forecast"><div style="font-weight:600;margin-bottom:6px;color:var(--ink)">결제 예상</div>${forecastHtml}</div>
    ${warningHtml}
    ${editHtml}`;


  updateMonthlyCost();
}

function updateMonthlyCost(){
  if(!balanceData||!balanceData.charges)return;
  const yt=balanceData.charges.find(c=>c.name.includes('YouTube'));
  if(yt){

    window._ytAmount=yt.amount;
  }
}

async function updateBalance(){
  const v=parseInt(document.getElementById('bal-input').value,10);
  if(isNaN(v)||v<0){alert('올바른 금액을 입력하세요');return;}
  balanceData.amount=v;
  balanceData.updated=fmtDate(new Date());

  balanceData.charges.forEach((c,i)=>{
    const amtEl=document.getElementById('charge-amt-'+i);
    const dayEl=document.getElementById('charge-day-'+i);
    if(amtEl)c.amount=parseInt(amtEl.value,10)||c.amount;
    if(dayEl)c.day=parseInt(dayEl.value,10)||c.day;
  });
  if(ghToken){
    const info=getRepoInfo();
    if(info&&info.repo){
      try{
        const g=await fetch(`https://api.github.com/repos/${info.owner}/${info.repo}/contents/balance.json`,{headers:{'Authorization':'token '+ghToken}});
        if(g.ok){
          const f=await g.json();
          const c=btoa(unescape(encodeURIComponent(JSON.stringify(balanceData,null,2)+'\n')));
          const r=await fetch(`https://api.github.com/repos/${info.owner}/${info.repo}/contents/balance.json`,{method:'PUT',headers:{'Authorization':'token '+ghToken,'Content-Type':'application/json'},body:JSON.stringify({message:'Update balance',content:c,sha:f.sha})});
          if(r.ok)toast('저장 완료','ok');else toast('저장 실패','err');
        }
      }catch{toast('네트워크 오류','err');}
    }
  }else{toast('토큰이 없어 로컬만 반영','info');}
  renderBalance();
  fetchExchangeRate();
}


async function fetchFile(file){
  const info=getRepoInfo();
  if(info&&info.repo){
    try{
      const headers=ghToken?{'Authorization':'token '+ghToken}:{};
      const r=await fetch(`https://api.github.com/repos/${info.owner}/${info.repo}/contents/${file}`,{headers});
      if(r.ok){const d=await r.json();return JSON.parse(decodeURIComponent(escape(atob(d.content))));}
    }catch{}
  }
  const r=await fetch('./'+file+'?t='+Date.now());
  return r.json();
}

async function init(){
  setupToken();
  try{serverData=await fetchFile('data.json');}catch{serverData=[];}
  const params=new URLSearchParams(location.search), searchName=params.get('name');
  if(ghToken)document.getElementById('admin-btn').style.display='';
  if(ghToken&&sessionStorage.getItem('yt_admin')==='1'){
    isAdmin=true;const l=localStorage.getItem(LS_KEY);
    if(l){payments=JSON.parse(l);hasLocalChanges=true;}else{payments=structuredClone(serverData);}
    showAdmin();
  }else{
    payments=structuredClone(serverData);showPublic();
    if(searchName){document.getElementById('search-input').value=searchName;doSearch(searchName);}
  }
  const now=new Date(),dow=['일','월','화','수','목','금','토'][now.getDay()];
  document.getElementById('pub-date').textContent=fmtDate(now)+' ('+dow+')';
  setupSearch();fetchExchangeRate();
  await fetchBalance();renderBalance();
}


function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addMonths(s,m){const d=new Date(s+'T00:00:00');d.setMonth(d.getMonth()+m);return d;}
function daysBetween(a,b){const da=new Date(a),db=new Date(b);da.setHours(0,0,0,0);db.setHours(0,0,0,0);return Math.round((db-da)/86400000);}
function uid(){return 'p'+Date.now()+Math.random().toString(36).slice(2,6);}

function computeStatus(data){
  const groups={};data.forEach(p=>{if(!groups[p.name])groups[p.name]=[];groups[p.name].push(p);});
  const today=new Date();today.setHours(0,0,0,0);const result=[];
  for(const name in groups){
    const list=groups[name].slice().sort((a,b)=>a.date.localeCompare(b.date));
    let coverEnd=null,totalMonths=0;
    list.forEach(p=>{const pd=new Date(p.date+'T00:00:00');const st=(!coverEnd||pd>coverEnd)?pd:coverEnd;coverEnd=addMonths(fmtDate(st),p.months);coverEnd.setHours(0,0,0,0);totalMonths+=p.months;});
    const last=list[list.length-1],dl=daysBetween(today,coverEnd);
    result.push({name,lastPayDate:last.date,lastPayMonths:last.months,totalMonths,coverEnd:fmtDate(coverEnd),daysLeft:dl,state:dl<0?'expired':dl<=30?'soon':'safe',count:list.length});
  }
  result.sort((a,b)=>a.daysLeft-b.daysLeft);return result;
}


function tryEnterAdmin(){
  if(!ghToken)return;isAdmin=true;sessionStorage.setItem('yt_admin','1');
  const l=localStorage.getItem(LS_KEY);if(l){payments=JSON.parse(l);hasLocalChanges=true;}else{payments=structuredClone(serverData);}
  showAdmin();
}
function closeModal(){document.getElementById('info-modal').classList.remove('active');}
function exitAdmin(){isAdmin=false;sessionStorage.removeItem('yt_admin');payments=structuredClone(serverData);hasLocalChanges=false;showPublic();}

function showPublic(){document.getElementById('public-view').style.display='grid';document.getElementById('admin-view').style.display='none';}
function showAdmin(){document.getElementById('public-view').style.display='none';document.getElementById('admin-view').style.display='grid';renderAdmin();}

// Search
function setupSearch(){
  const input=document.getElementById('search-input'),sugBox=document.getElementById('suggestions');let si=-1;
  input.addEventListener('input',()=>{
    const v=input.value.trim();if(!v){sugBox.classList.remove('active');document.getElementById('search-result').innerHTML='';updateURL('');return;}
    const ns=getNames(),ms=ns.filter(n=>n.includes(v));
    if(ms.length>0&&!(ms.length===1&&ms[0]===v)){sugBox.innerHTML=ms.map((n,i)=>'<div class="sug-item" data-name="'+esc(n)+'">'+esc(n)+'</div>').join('');sugBox.classList.add('active');si=-1;}else{sugBox.classList.remove('active');}
    if(ns.includes(v))doSearch(v);
  });
  input.addEventListener('keydown',e=>{
    const items=sugBox.querySelectorAll('.sug-item');
    if(!sugBox.classList.contains('active')||!items.length){if(e.key==='Enter')doSearch(input.value.trim());return;}
    if(e.key==='ArrowDown'){e.preventDefault();si=Math.min(si+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('selected',i===si));}
    else if(e.key==='ArrowUp'){e.preventDefault();si=Math.max(si-1,0);items.forEach((el,i)=>el.classList.toggle('selected',i===si));}
    else if(e.key==='Enter'){e.preventDefault();if(si>=0&&items[si]){input.value=items[si].dataset.name;sugBox.classList.remove('active');doSearch(input.value);}else{doSearch(input.value.trim());sugBox.classList.remove('active');}}
    else if(e.key==='Escape')sugBox.classList.remove('active');
  });
  sugBox.addEventListener('click',e=>{const it=e.target.closest('.sug-item');if(!it)return;input.value=it.dataset.name;sugBox.classList.remove('active');doSearch(it.dataset.name);});
  document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))sugBox.classList.remove('active');});
}
function getNames(){return[...new Set(serverData.map(p=>p.name))].sort();}
function updateURL(name){const u=new URL(location);if(name)u.searchParams.set('name',name);else u.searchParams.delete('name');history.replaceState(null,'',u);}

function doSearch(name){
  if(!name){document.getElementById('search-result').innerHTML='';updateURL('');return;}
  updateURL(name);
  const st=computeStatus(serverData),found=st.find(s=>s.name===name),box=document.getElementById('search-result');
  if(!found){box.innerHTML='<div class="no-result">"'+esc(name)+'" 검색 결과가 없습니다</div>';return;}
  const dn=found.daysLeft<0?'D+'+Math.abs(found.daysLeft):found.daysLeft===0?'D-DAY':'D-'+found.daysLeft;
  const dl=found.daysLeft<0?'만료됨':found.daysLeft===0?'오늘 만료!':'결제 만료까지';
  const sl=found.state==='safe'?'안전':found.state==='soon'?'곧 만료':'만료됨';
  box.innerHTML=`<div class="result-card border-${found.state}">
    <div class="r-name">${esc(found.name)}</div>
    <div class="dday-big ${found.state}">${dn}</div>
    <div class="dday-label">${dl}</div>
    <div class="info-grid">
      <div class="info-item"><div class="ik">납부 개월</div><div class="iv">${found.totalMonths}개월</div></div>
      <div class="info-item"><div class="ik">마지막 결제</div><div class="iv">${found.lastPayDate}</div></div>
      <div class="info-item"><div class="ik">다음 결제일</div><div class="iv">${found.coverEnd}</div></div>
    </div>
    <div class="status-bar ${found.state}">${found.state==='safe'?'결제가 유효합니다':found.state==='soon'?'곧 만료됩니다 — 갱신이 필요합니다':'만료되었습니다 — 결제를 갱신해주세요'}</div>
  </div>`;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Admin rendering
function renderAdmin(){
  const now=new Date(),dow=['일','월','화','수','목','금','토'][now.getDay()];
  document.getElementById('admin-today').textContent=fmtDate(now)+' ('+dow+')';
  const ls=document.getElementById('local-status');
  if(ghToken){ls.innerHTML=hasLocalChanges?'Token connected<span class="local-badge">UNPUBLISHED</span>':'Token connected';}
  else{ls.innerHTML=hasLocalChanges?'No token<span class="local-badge">MANUAL</span>':'No token · Export로 수동 저장';}
  const names=[...new Set(payments.map(p=>p.name))];
  document.getElementById('name-list').innerHTML=names.map(n=>'<option value="'+esc(n)+'">').join('');
  document.getElementById('f-date').value=fmtDate(now);
  const status=computeStatus(payments),total=payments.length,tm=payments.reduce((s,p)=>s+Number(p.months),0);
  const ec=status.filter(s=>s.state==='expired').length,sc=status.filter(s=>s.state==='soon').length;
  const nu=status.filter(s=>s.daysLeft>=0).sort((a,b)=>a.daysLeft-b.daysLeft)[0];
  document.getElementById('summary').innerHTML=`
    <div class="stat"><div class="label">Members</div><div class="value">${status.length}</div></div>
    <div class="stat"><div class="label">Payments</div><div class="value">${total}<small>건</small></div></div>
    <div class="stat"><div class="label">Total</div><div class="value">${tm}<small>개월</small></div></div>
    <div class="stat"><div class="label">Next Due</div><div class="value" style="font-size:18px">${nu?esc(nu.name)+' D-'+nu.daysLeft:'—'}</div></div>
    <div class="stat"><div class="label">Alerts</div><div class="value" style="color:${(ec+sc)>0?'var(--danger)':'var(--safe)'}">${ec+sc}<small>건</small></div></div>`;
  const mBox=document.getElementById('members');
  if(!status.length){mBox.innerHTML='<div class="empty-msg">NO DATA</div>';}
  else{mBox.innerHTML=status.map(s=>{
    const dt=s.daysLeft<0?'D+'+Math.abs(s.daysLeft)+' · 만료됨':s.daysLeft===0?'D-DAY · 오늘!':'D-'+s.daysLeft;
    return`<div class="card ${s.state==='safe'?'':'card-'+s.state}"><div class="status-dot dot-${s.state}"></div><div class="c-name">${esc(s.name)}</div><div class="c-sub">${s.totalMonths}개월 누적</div><div class="c-row"><span class="ck">마지막 결제</span><span class="cv">${s.lastPayDate}</span></div><div class="c-row"><span class="ck">결제 개월</span><span class="cv">${s.lastPayMonths}개월</span></div><div class="c-row"><span class="ck">커버 만료</span><span class="cv">${s.coverEnd}</span></div><div class="c-dday ${s.state}">${dt}</div><div class="c-actions"><button onclick="quickAdd('${esc(s.name)}')">+ 결제 추가</button></div></div>`;
  }).join('');}
  const sorted=[...payments].sort((a,b)=>b.date.localeCompare(a.date)),hBox=document.getElementById('history');
  if(!sorted.length){hBox.innerHTML='<div class="empty-msg">NO HISTORY</div>';}
  else{hBox.innerHTML=sorted.map(p=>`<div class="history-row"><div class="h-date">${p.date}</div><div class="h-name">${esc(p.name)}</div><div class="h-months">${p.months}개월</div><button class="h-del" onclick="deletePayment('${p.id}')">DEL</button></div>`).join('');}
  const saveBtn=document.getElementById('save-btn');
  if(ghToken&&hasLocalChanges){saveBtn.style.display='block';saveBtn.classList.add('has-changes');}
  else{saveBtn.style.display='none';saveBtn.classList.remove('has-changes');}
  document.getElementById('footer-token-info').textContent=ghToken?(hasLocalChanges?'저장되지 않은 변경사항 있음':'GitHub 연동됨'):'Token 미설정 · Export 수동 저장';
}

function markChanged(){
  localStorage.setItem(LS_KEY,JSON.stringify(payments));
  hasLocalChanges=true;
  renderAdmin();
}
async function saveToGitHub(){
  if(!ghToken){toast('토큰이 없습니다','err');return;}
  const ok=await ghCommitData(payments);
  if(ok){hasLocalChanges=false;localStorage.removeItem(LS_KEY);renderAdmin();}
}
function addPayment(){
  const n=document.getElementById('f-name').value.trim(),d=document.getElementById('f-date').value,m=parseInt(document.getElementById('f-months').value,10);
  if(!n||!d||!m||m<1){alert('이름, 날짜, 개월 수를 모두 입력해주세요');return;}
  payments.push({id:uid(),name:n,date:d,months:m});document.getElementById('f-name').value='';document.getElementById('f-months').value=1;markChanged();
}
function quickAdd(name){document.getElementById('f-name').value=name;document.getElementById('f-date').value=fmtDate(new Date());document.getElementById('f-months').focus();document.querySelector('.form-wrap').scrollIntoView({behavior:'smooth',block:'center'});}
function deletePayment(id){if(!confirm('이 결제 기록을 삭제할까요?'))return;payments=payments.filter(p=>p.id!==id);markChanged();}
function resetData(){if(!confirm('모든 데이터를 서버 원본으로 되돌릴까요?'))return;payments=structuredClone(serverData);localStorage.removeItem(LS_KEY);hasLocalChanges=false;renderAdmin();}
function exportData(){const b=new Blob([JSON.stringify(payments,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='data.json';a.click();URL.revokeObjectURL(u);}
window.addEventListener('beforeunload',e=>{if(hasLocalChanges){e.preventDefault();}})

init();
</script>
</body>
</html>
