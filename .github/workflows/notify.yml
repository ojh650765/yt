name: D-day Telegram Notification

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: d-day-telegram-notification
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-dday:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check D-day and send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG=$(node scripts/build_notify_message.js --write-balance)

          echo "$MSG"

          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}"

      - name: Commit updated balance
        run: |
          if ! git diff --quiet -- balance.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add balance.json
            git commit -m "Update INR balance"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
