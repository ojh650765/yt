name: D-day Telegram Notification

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 UTC 00:00 (한국시간 09:00)
  workflow_dispatch: # 수동 실행도 가능

jobs:
  check-dday:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check D-day and send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "Checking D-day for: $TODAY"

          # Node.js 스크립트로 D-day 체크
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('data.json', 'utf8'));

          const today = new Date();
          today.setHours(0,0,0,0);

          function addMonths(dateStr, months) {
            const d = new Date(dateStr + 'T00:00:00');
            d.setMonth(d.getMonth() + months);
            return d;
          }

          // 멤버별 만료일 계산
          const groups = {};
          data.forEach(p => {
            if (!groups[p.name]) groups[p.name] = [];
            groups[p.name].push(p);
          });

          const alerts = [];
          for (const name in groups) {
            const list = groups[name].sort((a,b) => a.date.localeCompare(b.date));
            let coverEnd = null;
            list.forEach(p => {
              const payDate = new Date(p.date + 'T00:00:00');
              const start = (!coverEnd || payDate > coverEnd) ? payDate : coverEnd;
              coverEnd = addMonths(start.toISOString().slice(0,10), p.months);
              coverEnd.setHours(0,0,0,0);
            });
            const daysLeft = Math.round((coverEnd - today) / 86400000);

            if (daysLeft === 0) {
              alerts.push('🔴 ' + name + ' — 오늘 만료!');
            } else if (daysLeft > 0 && daysLeft <= 7) {
              alerts.push('🟡 ' + name + ' — ' + daysLeft + '일 남음');
            } else if (daysLeft < 0) {
              alerts.push('⚫ ' + name + ' — ' + Math.abs(daysLeft) + '일 초과');
            }
          }

          if (alerts.length > 0) {
            const msg = '📢 YouTube Premium 결제 알림\n\n' + alerts.join('\n');
            const token = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            if (!token || !chatId) {
              console.log('Telegram credentials not set');
              console.log(msg);
              process.exit(0);
            }

            const https = require('https');
            const postData = JSON.stringify({ chat_id: chatId, text: msg, parse_mode: 'HTML' });
            const req = https.request({
              hostname: 'api.telegram.org',
              path: '/bot' + token + '/sendMessage',
              method: 'POST',
              headers: { 'Content-Type': 'application/json' }
            }, res => {
              console.log('Telegram status:', res.statusCode);
            });
            req.write(postData);
            req.end();
          } else {
            console.log('No alerts today');
          }
          "
