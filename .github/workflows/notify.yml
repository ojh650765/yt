name: D-day Telegram Notification

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-dday:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check D-day and send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG=$(node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('data.json', 'utf8'));
          const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
          const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

          function addMonths(s, m) { const d = new Date(s+'T00:00:00'); d.setMonth(d.getMonth()+m); return d; }

          const groups = {};
          data.forEach(p => { if(!groups[p.name]) groups[p.name]=[]; groups[p.name].push(p); });

          const members = [];
          for (const name in groups) {
            const list = groups[name].sort((a,b) => a.date.localeCompare(b.date));
            let coverEnd = null;
            list.forEach(p => {
              const pd = new Date(p.date+'T00:00:00');
              const st = (!coverEnd || pd > coverEnd) ? pd : coverEnd;
              coverEnd = addMonths(st.toISOString().slice(0,10), p.months);
              coverEnd.setHours(0,0,0,0);
            });
            members.push({ name, dl: Math.round((coverEnd - today) / 86400000) });
          }
          members.sort((a,b) => a.dl - b.dl);

          const lines = members.map(m => {
            if (m.dl < 0) return '⚫ ' + m.name + ' — ' + Math.abs(m.dl) + '일 초과';
            if (m.dl === 0) return '🔴 ' + m.name + ' — 오늘 만료!';
            return '🟢 ' + m.name + ' — D-' + m.dl;
          });
          console.log('YouTube Premium 결제 현황\n\n' + lines.join('\n'));
          ")

          echo "$MSG"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}"
